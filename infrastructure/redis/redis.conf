# Production Redis config — durable AOF + bounded memory.
# Mirrors docs/devops/docker.md §"infrastructure/redis/redis.conf".
# The password is supplied at runtime via `--requirepass` / REDIS_PASSWORD;
# do not hard-code secrets here.

appendonly yes
appendfsync everysec

maxmemory 256mb
maxmemory-policy allkeys-lru

# Disable the most dangerous admin commands in shared environments.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
