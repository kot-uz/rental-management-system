# CI pipeline — adapts the GitLab spec in docs/devops/cicd.md to GitHub Actions.
# Stages: lint + typecheck → build → prisma migrate validate → docker build.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend-migrate:
    name: Backend (prisma migrate validate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rental
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U rental"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql://rental:rental@localhost:5432/rental
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - run: npm ci
      - name: Apply migrations to a clean DB
        run: npx prisma migrate deploy
      - name: Verify schema is in sync with migrations
        run: npx prisma migrate status

  backend-e2e:
    name: Backend (e2e — live Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rental_test
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U rental"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql://rental:rental@localhost:5432/rental_test
      TEST_DATABASE_URL: postgresql://rental:rental@localhost:5432/rental_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Migrate the test database
        run: npx prisma migrate deploy
      - run: npm run test:e2e

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          target: runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
